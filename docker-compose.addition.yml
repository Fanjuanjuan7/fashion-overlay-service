services:
  overlay-service:
    build:
      context: ./overlay-service
      dockerfile: Dockerfile
    container_name: overlay-service
    restart: unless-stopped
    ports:
      - "7001:7001"
    environment:
      - NODE_ENV=production
      - PORT=7001
      - TZ=Asia/Shanghai
      - CHROMIUM_PATH=/usr/bin/chromium
    networks:
      - n8n-network
    shm_size: "1gb"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
